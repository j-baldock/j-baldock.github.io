website:
  title: "Jeff Baldock"
  site-url: "https://j-baldock.github.io/"
  description: "Aquatic ecologist and Postdoctoral Scholar at Oregon State University studying freshwater fish ecology, ecohydrology, and conservation biology in river networks."
  navbar:
    left: 
      # - text: "Home"
      #   href: index.qmd
      - text: "News"
        href: news/news.qmd
      - text: "About"
        href: about/about.qmd
      - text: "Research"
        href: research/research.qmd
      - text: "Publications"
        href: publications/publications.qmd
      - text: "Teaching & outreach"
        menu: 
          - text: "Teaching & mentoring"
            href: teaching/teaching.qmd
          - text: "Presentations"
            href: presentations/presentations.qmd
      - text: "Open science & data"
        href: dataprod/dataproducts.qmd
    right:
      - text: "CV"
        href: cv/cv.qmd
      - icon: github
        href: https://github.com/j-baldock
        target: _blank
      - text: "{{< ai google-scholar size=Large >}}"
        href: https://scholar.google.com/citations?user=CRU3WVMAAAAJ&hl=en&oi=sra
        target: _blank
      - text: "{{< ai researchgate size=Large >}}"
        href: https://www.researchgate.net/profile/Jeff-Baldock
        target: _blank
      - text: "{{< ai orcid size=large >}}"
        href: https://orcid.org/0000-0002-2791-7535
        target: _blank

  page-footer:  
    left: >-
     &#169; 2026 Jeff Baldock &#8729; Made with [Quarto](https://quarto.org)
    right: "Updated on {{< var updated >}}"


